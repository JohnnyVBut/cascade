  <path class="edgeB" d="M138 136 L64 178"/>
  <path class="edgeB" d="M138 136 L214 160"/>
  <path class="edgeB" d="M138 136 L106 214"/>

  <circle class="nodeOuter" cx="124" cy="58" r="17"/>
  <circle class="nodeOuter" cx="64" cy="178" r="17"/>
  <circle class="nodeOuter" cx="214" cy="160" r="17"/>
  <circle class="nodeOuter" cx="106" cy="214" r="17"/>

  <circle class="controller" cx="138" cy="136" r="19"/>
  <circle class="controllerCore" cx="138" cy="136" r="7"/>

  <circle class="nodeInner" cx="124" cy="58" r="5.5"/>
