# /etc/sysctl.d/99-awg.conf
# Persistent network tuning for AWG-Easy (applied on every boot).
#
# Install:
#   sudo cp sysctl.d/99-awg.conf /etc/sysctl.d/99-awg.conf
#   sudo sysctl --system
#
# These settings are also applied at runtime by run.sh.
# With --network host, the container and the host share one network
# namespace, so all sysctl knobs here affect both equally.

# ----------------------------------------------------------------
# Required for WireGuard / AWG routing
# ----------------------------------------------------------------
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
net.ipv4.conf.all.src_valid_mark = 1

# ----------------------------------------------------------------
# TCP congestion control — BBR + FQ packet scheduler
# Best throughput and latency on lossy or long-latency links.
# Requires kernel 4.9+ and tcp_bbr module.
# ----------------------------------------------------------------
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# ----------------------------------------------------------------
# Socket buffer sizes (~256 MB ceiling, kernel auto-tunes within)
# ----------------------------------------------------------------
net.core.rmem_max = 268435456
net.core.wmem_max = 268435456
net.ipv4.tcp_rmem = 4096 131072 268435456
net.ipv4.tcp_wmem = 4096 65536 268435456

# ----------------------------------------------------------------
# Connection queue / SYN backlog
# ----------------------------------------------------------------
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# ----------------------------------------------------------------
# TIME_WAIT reuse (safe for outbound / tunnelled connections)
# ----------------------------------------------------------------
net.ipv4.tcp_tw_reuse = 1

# ----------------------------------------------------------------
# Netfilter connection tracking
# Raise the table limit for hubs with many concurrent VPN clients.
# Comment out if nf_conntrack is not loaded.
# ----------------------------------------------------------------
net.netfilter.nf_conntrack_max = 524288
